version: "3.9"

services:
  docker_dev:
    image: 0xee/my_docker_aio:latest
    container_name: my_docker_aio
    ports:
      - "80:80"
      - "5432:5432"
    volumes:
      - ./nginx:/etc/nginx
      - ./html:/var/www/html
    command: ["/bin/bash", "/myDocker/start_service.sh"]
    restart: unless-stopped
